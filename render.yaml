services:
  - type: web
    name: bus-tracking-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bus-tracking-db
          property: connectionString

databases:
  - name: bus-tracking-db
    plan: free
