# Render Blueprint — deploys this app as a single always-on Docker web service.
#
# How to use:
#   1. Seed the Google Voice browser profile locally (npm run seed-profile) and
#      copy the profile directory onto the service's /data disk, OR sign in once
#      from a Render shell session with a forwarded display. See README.
#   2. Push this repo to GitHub/GitLab/Bitbucket (private is fine).
#   3. In Render: New ▸ Blueprint ▸ connect the repo.
#   4. Render reads this file and prompts you for each "sync: false" secret.
#   5. Deploy. It starts in OBSERVATION mode (no sending). Only set
#      OBSERVATION_MODE=false after the live smoke test passes (see README +
#      docs/google-voice-live-test-checklist.md).
#
# A persistent disk holds the SQLite database, the Chromium profile, downloaded
# media, and diagnostic screenshots. Chromium needs more memory than the free
# tier, so this uses a paid instance.

services:
  - type: web
    name: gv-appointment-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /healthz
    disk:
      name: data
      mountPath: /data
      sizeGB: 2
    envVars:
      # ── Secrets: Render prompts you for these on first deploy ──
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Paste the entire contents of the google-token.json you generate locally
      # with `npm run auth` (Calendar access). One line is fine.
      - key: GOOGLE_TOKEN_JSON
        sync: false
      # The shop owner's Google Voice line (approvals/clarifications).
      - key: OWNER_PHONE_NUMBER
        sync: false
      # Dashboard login. Pick a strong password — the dashboard is locked
      # without it (no password = no access).
      - key: DASHBOARD_USER
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: SHOP_NAME
        sync: false
      - key: SHOP_TIMEZONE
        sync: false
      - key: GV_PROFILE_ARCHIVE_PASSWORD
        sync: false

      # ── Non-secret defaults: edit here or in the dashboard ──
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: GOOGLE_CALENDAR_ID
        value: primary
      - key: DEFAULT_APPOINTMENT_MINUTES
        value: "60"
      - key: CRON_SCHEDULE
        value: "*/5 * * * *"
      # START IN OBSERVATION MODE. Flip to "false" only after validating live
      # inbox parsing, recipient selection, dedup, images, and owner routing.
      - key: OBSERVATION_MODE
        value: "true"
      - key: POLL_INTERVAL_SECONDS
        value: "60"
      - key: SEND_RATE_PER_MINUTE
        value: "6"
      - key: MEDIA_RETENTION_DAYS
        value: "90"
      # Persistent-disk paths (also set in the Dockerfile).
      - key: DB_PATH
        value: /data/data.db
      - key: GV_PROFILE_PATH
        value: /data/google-voice-profile
      - key: MEDIA_PATH
        value: /data/media
      - key: DIAGNOSTICS_PATH
        value: /data/diagnostics
      - key: GV_PROFILE_ARCHIVE_PATH
        value: /app/secrets/gv-profile.tar.gz.enc
      - key: NODE_ENV
        value: production
